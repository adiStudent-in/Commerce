<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 500' width='600' height='500'>
  <rect width='600' height='500' fill='white'/>
  <text x='300' y='30' text-anchor='middle' font-size='18' font-weight='bold' fill='#1a237e'>PPF: Attainable & Unattainable Combinations</text>
  <line x1='80' y1='420' x2='550' y2='420' stroke='black' stroke-width='2'/>
  <line x1='80' y1='420' x2='80' y2='40' stroke='black' stroke-width='2'/>
  <polygon points='545,416 555,420 545,424' fill='black'/>
  <polygon points='76,45 80,35 84,45' fill='black'/>
  <text x='300' y='460' text-anchor='middle' font-size='15' font-weight='bold'>Good X (Quantity)</text>
  <text x='30' y='230' text-anchor='middle' font-size='15' font-weight='bold' transform='rotate(-90,30,230)'>Good Y (Quantity)</text>
  <path d='M 80,400 Q 280,350 500,60' fill='none' stroke='#1565c0' stroke-width='3'/>
  <circle cx='130' cy='370' r='6' fill='#2e7d32'/>
  <text x='120' y='360' font-size='13' fill='#2e7d32' font-weight='bold'>A (Efficient)</text>
  <circle cx='250' cy='280' r='6' fill='#2e7d32'/>
  <text x='240' y='270' font-size='13' fill='#2e7d32' font-weight='bold'>B (Efficient)</text>
  <circle cx='380' cy='170' r='6' fill='#2e7d32'/>
  <text x='370' y='160' font-size='13' fill='#2e7d32' font-weight='bold'>C (Efficient)</text>
  <circle cx='200' cy='350' r='6' fill='#e65100'/>
  <text x='155' y='340' font-size='13' fill='#e65100' font-weight='bold'>D (Inefficient)</text>
  <path d='M 200,350 L 250,280' stroke='#e65100' stroke-dasharray='5,3' stroke-width='1.5'/>
  <circle cx='430' cy='100' r='6' fill='#c62828'/>
  <text x='430' y='90' font-size='13' fill='#c62828' font-weight='bold'>E (Unattainable)</text>
  <path d='M 430,100 L 380,170' stroke='#c62828' stroke-dasharray='5,3' stroke-width='1.5'/>
  <rect x='60' y='475' width='500' height='20' rx='5' fill='#f5f5f5' stroke='#ccc'/>
  <circle cx='80' cy='485' r='4' fill='#2e7d32'/>
  <text x='90' y='489' font-size='11' fill='#333'>On Curve = Efficient (Full Utilization)</text>
  <circle cx='260' cy='485' r='4' fill='#e65100'/>
  <text x='270' y='489' font-size='11' fill='#333'>Inside = Inefficient (Underutilization)</text>
  <circle cx='450' cy='485' r='4' fill='#c62828'/>
  <text x='460' y='489' font-size='11' fill='#333'>Outside = Unattainable</text>
</svg>