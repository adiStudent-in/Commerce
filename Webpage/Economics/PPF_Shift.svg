<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 700 450' width='700' height='450'>
  <rect width='700' height='450' fill='white'/>
  <text x='350' y='30' text-anchor='middle' font-size='18' font-weight='bold' fill='#1a237e'>Shift in PPF (Rightward & Leftward)</text>
  <line x1='80' y1='380' x2='650' y2='380' stroke='black' stroke-width='2'/>
  <line x1='80' y1='380' x2='80' y2='40' stroke='black' stroke-width='2'/>
  <polygon points='645,376 655,380 645,384' fill='black'/>
  <polygon points='76,45 80,35 84,45' fill='black'/>
  <text x='350' y='425' text-anchor='middle' font-size='15' font-weight='bold'>Good X</text>
  <text x='25' y='210' text-anchor='middle' font-size='15' font-weight='bold' transform='rotate(-90,25,210)'>Good Y</text>
  <path d='M 80,360 Q 280,280 450,60' fill='none' stroke='#1565c0' stroke-width='3' stroke-dasharray='8,4'/>
  <text x='460' y='55' font-size='13' fill='#1565c0' font-weight='bold'>Original PPF</text>
  <path d='M 140,360 Q 380,260 570,60' fill='none' stroke='#2e7d32' stroke-width='3'/>
  <text x='580' y='55' font-size='13' fill='#2e7d32' font-weight='bold'>Rightward Shift</text>
  <text x='150' y='40' font-size='12' fill='#2e7d32'>(More Resources / Better Tech)</text>
  <path d='M 80,360 Q 180,300 300,60' fill='none' stroke='#c62828' stroke-width='3'/>
  <text x='80' y='55' font-size='13' fill='#c62828' font-weight='bold'>Leftward Shift</text>
  <text x='80' y='70' font-size='12' fill='#c62828'>(Natural Disaster / War / Tech Degradation)</text>
  <rect x='170' y='435' width='380' height='30' rx='5' fill='#f5f5f5' stroke='#ccc'/>
  <line x1='190' y1='450' x2='230' y2='450' stroke='#1565c0' stroke-width='3' stroke-dasharray='8,4'/>
  <text x='240' y='454' font-size='11' fill='#333'>Original PPF</text>
  <line x1='340' y1='450' x2='380' y2='450' stroke='#2e7d32' stroke-width='3'/>
  <text x='390' y='454' font-size='11' fill='#333'>Rightward (Growth - Resources ↑ / Technology ↑)</text>
  <line x1='550' y1='450' x2='570' y2='450' stroke='#c62828' stroke-width='3'/>
  <text x='575' y='454' font-size='11' fill='#333'>Leftward (Decline)</text>
</svg>